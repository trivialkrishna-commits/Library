<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>HMD eReader</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #f4e9d8;
      color: #333;
      line-height: 1.6;
    }
    .container { max-width: 100%; margin: 0 auto; padding: 10px; }

    /* Book List */
    .book-list button {
      display: block;
      width: 100%;
      padding: 15px;
      margin: 8px 0;
      font-size: 1.1em;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 8px;
      text-align: left;
    }

    /* Reader */
    #reader {
      display: none;
      flex-direction: column;
      height: 100vh;
    }
    #book-content {
      flex: 1;
      overflow-y: auto;
      padding: 15px 20px;
      font-size: 1.1em;
      background: #fff;
      color: #333;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      background: #f8f1e3;
      position: sticky;
      bottom: 0;
      border-top: 1px solid #ccc;
    }
    button {
      padding: 10px 16px;
      font-size: 1em;
      border: none;
      border-radius: 6px;
      background: #555;
      color: white;
    }
    button:active { background: #333; }
    #page-input {
      width: 60px;
      text-align: center;
      padding: 8px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      background: #5c4634;
      color: white;
    }
  </style>
</head>
<body>

  <!-- Book List Screen -->
  <div id="list-screen">
    <div class="header">
      <h2>HMD eReader</h2>
      <button onclick="toggleTheme()">🌗</button>
    </div>
    <div class="container">
      <h3>My Books</h3>
      <div class="book-list">
        <!-- === ADD YOUR BOOKS HERE AS BUTTONS === -->
        <button onclick="loadBook('The Blue lagoon', 'The blue lagoon.txt')">Atomic Habits</button>
        <button onclick="loadBook('Dune', 'dune.txt')">Dune</button>
        <button onclick="loadBook('Your Book', 'your-book.txt')">Your Book</button>
        <!-- Add more like this -->
      </div>
    </div>
  </div>

  <!-- Reader Screen (same as before) -->
  <div id="reader" style="display:none; flex-direction:column; height:100vh;">
    <div class="header">
      <button onclick="backToList()">← Back</button>
      <span id="book-title" style="font-weight:bold;"></span>
      <button onclick="toggleTheme()">🌗</button>
    </div>

    <div id="book-content" style="flex:1; overflow-y:auto; padding:15px 20px; font-size:1.1em; background:#fff; margin:10px; border-radius:8px;"></div>

    <div class="controls">
      <button onclick="prevPage()">← Prev</button>
      <div>
        Page <input type="number" id="page-input" value="1" onchange="goToPage()" style="width:60px;text-align:center;">
        / <span id="total-pages">1</span>
      </div>
      <button onclick="nextPage()">Next →</button>
    </div>
  </div>

<script>
// ============= CONFIG =============
const WORDS_PER_PAGE = 380;   // adjust if text is too small/big

let currentBookText = "";
let currentPages = [];
let currentPage = 1;
let isDark = false;

// Simple load function (no fetch in list)
function loadBook(title, filename) {
  fetch(`books/${filename}`)
    .then(response => {
      if (!response.ok) throw new Error("File not found");
      return response.text();
    })
    .then(text => {
      currentBookText = text.trim();
      currentPages = splitIntoPages(currentBookText);
      currentPage = 1;

      document.getElementById('list-screen').style.display = 'none';
      document.getElementById('reader').style.display = 'flex';
      document.getElementById('book-title').textContent = title;
      
      renderCurrentPage();
    })
    .catch(err => {
      alert("Cannot load book: " + filename + "\nMake sure file is in 'books' folder");
      console.error(err);
    });
}

function splitIntoPages(text) {
  const words = text.split(/\s+/);
  const pages = [];
  for (let i = 0; i < words.length; i += WORDS_PER_PAGE) {
    pages.push(words.slice(i, i + WORDS_PER_PAGE).join(' '));
  }
  return pages;
}

function renderCurrentPage() {
  const contentDiv = document.getElementById('book-content');
  contentDiv.innerHTML = `<p>${currentPages[currentPage-1] || "End of book"}</p>`;
  
  document.getElementById('page-input').value = currentPage;
  document.getElementById('total-pages').textContent = currentPages.length;
}

function nextPage() { if (currentPage < currentPages.length) { currentPage++; renderCurrentPage(); } }
function prevPage() { if (currentPage > 1) { currentPage--; renderCurrentPage(); } }
function goToPage() {
  let page = parseInt(document.getElementById('page-input').value);
  if (page >= 1 && page <= currentPages.length) {
    currentPage = page;
    renderCurrentPage();
  }
}

function backToList() {
  document.getElementById('reader').style.display = 'none';
  document.getElementById('list-screen').style.display = 'block';
}

function toggleTheme() {
  isDark = !isDark;
  const content = document.getElementById('book-content');
  if (isDark) {
    content.style.background = '#2b2b2b';
    content.style.color = '#e0d0b0';
  } else {
    content.style.background = '#fff';
    content.style.color = '#333';
  }
}
</script>
</body>
</html>
